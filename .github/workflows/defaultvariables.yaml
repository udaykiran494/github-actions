name: Print GitHub Default Variables

on:
  push:
  workflow_dispatch:

jobs:
  print-vars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print runner and repo info
        run: |
          echo "Runner OS:        $GITHUB_RUNNER_OS"
          echo "Workspace:        $GITHUB_WORKSPACE"
          echo "Repository:       $GITHUB_REPOSITORY"
          echo "Repository owner: $GITHUB_REPOSITORY_OWNER"
          echo "Server URL:       $GITHUB_SERVER_URL"
          echo "API URL:          $GITHUB_API_URL"

      - name: Print event and ref info
        run: |
          echo "Event name:  $GITHUB_EVENT_NAME"
          echo "Ref:         $GITHUB_REF"
          echo "Ref name:    $GITHUB_REF_NAME"
          echo "Ref type:    $GITHUB_REF_TYPE"
          echo "SHA:         $GITHUB_SHA"
          echo "Head ref:    $GITHUB_HEAD_REF"
          echo "Base ref:    $GITHUB_BASE_REF"

      - name: Print actor and workflow info
        run: |
          echo "Actor:            $GITHUB_ACTOR"
          echo "Triggering actor: $GITHUB_TRIGGERING_ACTOR"
          echo "Workflow:         $GITHUB_WORKFLOW"
          echo "Workflow ref:     $GITHUB_WORKFLOW_REF"
          echo "Run ID:           $GITHUB_RUN_ID"
          echo "Run number:       $GITHUB_RUN_NUMBER"
          echo "Run attempt:      $GITHUB_RUN_ATTEMPT"
          echo "Job:              $GITHUB_JOB"
          echo "Action:           $GITHUB_ACTION"
          echo "Action path:      $GITHUB_ACTION_PATH"

      - name: Dump ALL environment variables (sorted)
        run: env | sort